name: Process Proverbs with AI
on:
  schedule:
    # Run 3 times daily: 02:00, 10:00, 18:00 UTC (05:00, 13:00, 21:00 UTC+3)
    - cron: "0 2,10,18 * * *"
  workflow_dispatch: # Allows manual trigger

concurrency:
  group: proverbs-db-write
  cancel-in-progress: false

# Limit permissions to what is strictly necessary
permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Enable pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY is not set. Add it in repository secrets."
            exit 1
          fi

      - name: Process Proverbs with AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python ai_processor.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/proverbs.db
          # Only commit and push if staged changes exist
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git commit -m "chore: process proverbs with AI [skip ci]"
          git push origin "${GITHUB_REF_NAME}"