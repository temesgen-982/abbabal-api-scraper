name: Fetch Proverbs Setup
on:
  schedule:
    # 7:00 AM, 15:00 PM, 23:00 PM (UTC + 3)
    - cron: "0 4,12,20 * * *"
  workflow_dispatch: # Allows manual trigger

concurrency:
  group: proverbs-db-write
  cancel-in-progress: false

# Limit permissions to what is strictly necessary
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Enable pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Updates
        env:
          # Pass credentials directly as environment variables rather than persisting to .env
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: |
          # Decode the base64 session secret back into a file
          echo "${TG_SESSION}" | base64 --decode > ababaloch.session

          # Run the scraper
          python main.py

          # Securely clean up the session file after execution
          rm -f ababaloch.session

      - name: Commit and Push Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/proverbs.db
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: fetch latest proverbs [skip ci]"
          git push
